{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Реєстрація — ElectroShop{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title text-center mb-4">Реєстрація</h4>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 mt-2">Зареєструватися</button>
                </form>
                <p class="text-center mt-3 text-muted">
                    Вже є акаунт? <a href="{% url 'accounts:login' %}">Увійти</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
